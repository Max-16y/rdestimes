<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicações</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #333;
      color: white;
      padding: 10px;
      text-align: center;
    }

    h1 {
      margin: 0;
    }

    #content {
      padding: 20px;
    }

    form {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    form div {
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    /* Ajustando o contêiner do formulário */
.form-container {
  max-width: 900px; /* Largura máxima para telas grandes */
  margin: 0 auto;   /* Centraliza o contêiner */
  padding: 20px;
  background-color: #f9f9f9; /* Fundo leve para destacar o formulário */
  border-radius: 8px; /* Cantos arredondados */
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Sombra para destaque */
}

/* Estilo para o formulário */
#publication-form label {
  font-weight: bold;
  margin-top: 10px;
  display: block; /* Força os rótulos a ficarem acima dos campos */
}

#publication-form input, 
#publication-form textarea, 
#publication-form button {
  width: 100%; /* Ocupa toda a largura disponível */
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 16px;
}

#publication-form textarea {
  resize: vertical; /* Permite redimensionamento vertical */
}

#publication-form button {
  background-color: darkgoldenrod; /* Cor do botão */
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  border: none;
}

#publication-form button:hover {
  background-color: #0056b3; /* Azul mais escuro ao passar o mouse */
}


    button {
      padding: 15px;
      background-color: #333;
      color: #fff;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background-color: #575757;
    }
  </style>
</head>
<body>
  <header>
    <h1>Publicações</h1>
  </header>

  <div id="content">
    <section>
      <h2>Criar uma Nova Publicação</h2>
      <form id="publication-form">
        <div>
          <label for="title">Título da Matéria:</label>
          <input type="text" id="title" name="title" placeholder="Digite o título" required>
        </div>
        <div>
          <label for="content">Texto:</label>
          <textarea id="content" name="content" placeholder="Digite o texto" required></textarea>
        </div>
        <div>
          <label for="attachment">Anexar Arquivo (opcional):</label>
          <input type="file" id="attachment" name="attachment" accept="image/*,video/*,.pdf">
        </div>
        <button type="button" onclick="postPublication()">Postar</button>
      </form>
    </section>
  </div>

  <script>
    function postPublication() {
      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      const attachmentInput = document.getElementById('attachment');
      let attachment = null;

      if (attachmentInput.files.length > 0) {
        const file = attachmentInput.files[0];
        const reader = new FileReader();

        reader.onload = function(event) {
          attachment = event.target.result;
          savePublication(title, content, attachment);
        };

        reader.readAsDataURL(file);
      } else {
        savePublication(title, content, attachment);
      }
    }

    function savePublication(title, content, attachment) {
      if (!title || !content) {
        alert("Por favor, preencha o título e o texto.");
        return;
      }

      const publications = JSON.parse(localStorage.getItem('publications')) || [];
      const newPublication = {
        id: new Date().getTime(),
        title,
        content,
        attachment,
        date: new Date().toISOString()
      };

      publications.unshift(newPublication); // Adiciona no início da lista
      localStorage.setItem('publications', JSON.stringify(publications));

      alert("Publicação criada com sucesso!");
      document.getElementById('publication-form').reset();
    }
  </script>
</body>
</html>
