<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicações</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    /* Estilo do Menu Lateral */
    #sidebar {
      width: 250px;
      position: fixed;
      top: 0;
      left: -250px;
      height: 100%;
      background-color: #333;
      transition: 0.3s;
      padding-top: 60px;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.3);
    }

    #sidebar ul {
      list-style-type: none;
      padding: 0;
    }

    #sidebar ul li {
      padding: 10px 20px;
      text-align: left;
    }

    #sidebar ul li a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      display: block;
    }

    #sidebar ul li a:hover {
      background-color: #575757;
    }

    /* Estilo da Barra de Navegação */
    .open-btn {
      font-size: 30px;
      color: white;
      background-color: #333;
      border: none;
      padding: 10px;
      cursor: pointer;
      position: absolute;
      top: 15px;
      left: 15px;
    }

    .close-btn {
      font-size: 30px;
      color: white;
      background-color: #333;
      border: none;
      padding: 10px;
      cursor: pointer;
      position: absolute;
      top: 15px;
      right: 15px;
    }

    header h1 {
      text-align: center;
      font-family: 'Arial', sans-serif;
      margin-top: 20px;
      color: #333;
    }

    /* Estilo do conteúdo principal */
    #content {
      margin-left: 270px;
      padding: 30px;
      background-color: #f7f7f7;
    }

    section {
      background-color: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
    }

    button {
      background-color: #333;
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #555;
    }

    textarea {
      resize: vertical;
      height: 150px;
    }

    input[type="file"] {
      padding: 10px;
    }

    /* Responsividade */
    @media (max-width: 768px) {
      #content {
        margin-left: 0;
        padding: 15px;
      }

      #sidebar {
        left: -250px;
      }

      .open-btn {
        display: block;
      }
    }
  </style>
</head>

<body>
  <!-- Menu Lateral -->
  <div id="sidebar">
    <button class="close-btn" onclick="closeSidebar()">×</button>
    <ul>
      <li><a href="dashboard.html">Início</a></li>
      <li><a href="publicacoes.html">Publicações</a></li>
      <li><a href="projetos.html">Projetos</a></li>
      <li><a href="relatorios.html">Relatórios</a></li>
    </ul>
  </div>

  <!-- Barra de Navegação -->
  <header>
    <button class="open-btn" onclick="openSidebar()">☰</button>
    <h1>Bem-vindo ao Dashboard</h1>
  </header>

  <!-- Página de Publicações -->
  <div id="content">
    <header>
      <h1>Publicações</h1>
    </header>

    <section>
      <h2>Criar uma Nova Publicação</h2>
      <form id="publication-form">
        <div>
          <label for="title">Título da Matéria:</label>
          <input type="text" id="title" name="title" placeholder="Digite o título" required>
        </div>
        <div>
          <label for="content">Texto:</label>
          <textarea id="content" name="content" placeholder="Digite o texto" required></textarea>
        </div>
        <div>
          <label for="attachment">Anexar Arquivo (opcional):</label>
          <input type="file" id="attachment" name="attachment" accept="image/*,video/*,.pdf">
        </div>
        <button type="button" onclick="postPublication()">Postar</button>
      </form>
    </section>
  </div>

  <script>
    // Funções de abertura e fechamento do menu lateral
    function openSidebar() {
      document.getElementById('sidebar').style.left = '0';
    }

    function closeSidebar() {
      document.getElementById('sidebar').style.left = '-250px';
    }

    // Função para postar a publicação
    function postPublication() {
      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      const attachmentInput = document.getElementById('attachment');
      let attachment = null;

      if (attachmentInput.files.length > 0) {
        const file = attachmentInput.files[0];
        const reader = new FileReader();

        reader.onload = function(event) {
          attachment = event.target.result;
          savePublication(title, content, attachment);
        };

        reader.readAsDataURL(file);
      } else {
        savePublication(title, content, attachment);
      }
    }

    // Função para salvar a publicação no localStorage
    function savePublication(title, content, attachment) {
      if (title.trim() === '' || content.trim() === '') {
        alert('Por favor, preencha o título e o conteúdo.');
        return;
      }

      const publications = JSON.parse(localStorage.getItem('publications')) || [];
      const newPublication = {
        id: new Date().getTime(),
        title,
        content,
        attachment,
        date: new Date().toISOString(),
      };

      publications.unshift(newPublication); // Adiciona no início da lista
      localStorage.setItem('publications', JSON.stringify(publications));

      alert("Publicação criada com sucesso!");
      document.getElementById('publication-form').reset();
    }
  </script>
</body>
</html>
