<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Galeria - RDES TIMES</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Projetos</h1>
  </header>

  <div id="content">
    <section id="publications-section">
      <h2>Publicações Recentes</h2>
      <!-- As publicações serão carregadas aqui -->
    </section>
  </div>

  <script>
    function loadPublications() {
      const publications = JSON.parse(localStorage.getItem('publications')) || [];
      const section = document.getElementById('publications-section');

      if (publications.length === 0) {
        section.innerHTML = '<p>Não há publicações no momento.</p>';
        return;
      }

      publications.forEach(pub => {
        const publicationDiv = document.createElement('div');
        publicationDiv.classList.add('publication');

        publicationDiv.innerHTML = `
          <h3>${pub.title}</h3>
          <p>${pub.content}</p>
          ${pub.attachment ? `<img src="${pub.attachment}" alt="Anexo">` : ''}
          <div class="date">Publicado em: ${new Date(pub.date).toLocaleString()}</div>
        `;

        section.appendChild(publicationDiv);
      });
    }

    // Carrega as publicações ao abrir a página
    window.onload = loadPublications;
  </script>
</body>
