<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projetos</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <!-- Formulário de publicação -->
  <form id="publication-form" onsubmit="savePublication(event)">
    <input type="text" id="titulo" placeholder="Título" required />
    <textarea id="conteudo" placeholder="Conteúdo" required></textarea>
    <input type="text" id="categoria" placeholder="Categoria" required />
    <input type="text" id="media-url" placeholder="URL da Mídia (opcional)" />
    <button type="submit">Publicar</button>
  </form>

  <!-- Container para exibir publicações -->
  <div id="publicationsContainer"></div>

  <!-- Incluindo o script JavaScript -->
  <script src="js/publicacoes.js"></script>
</body>
</html>
