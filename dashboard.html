<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Página Inicial</title>
  
  <!-- Estilos CSS direto no arquivo HTML -->
  <style>
    /* Estilos Gerais */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }

    header {
      background-color: #333;
      color: white;
      padding: 10px 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
    }

    /* Menu Lateral */
    #sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #333;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
    }

    #sidebar ul {
      list-style-type: none;
      padding: 0;
    }

    #sidebar ul li {
      padding: 8px;
      text-align: center;
    }

    #sidebar ul li a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 10px;
    }

    #sidebar ul li a:hover {
      background-color: #575757;
    }

    .open-btn {
      font-size: 30px;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    .close-btn {
      font-size: 36px;
      color: white;
      border: none;
      background: none;
      position: absolute;
      top: 20px;
      left: 20px;
    }

    /* Conteúdo Principal */
    #content {
      margin-left: 0;
      padding: 20px;
    }

    .intro {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    /* Responsividade */
    @media screen and (max-width: 768px) {
      #sidebar {
        width: 100%;
        height: 100%;
      }

      #content {
        margin-left: 0;
      }

      .open-btn {
        font-size: 25px;
      }
    }
  </style>
</head>
<body>

  <!-- Menu Lateral -->
  <div id="sidebar">
    <button class="close-btn" onclick="closeSidebar()">×</button>
    <ul>
      <li><a href="dashboard.html">Início</a></li>
      <li><a href="publicacoes.html">Publicações</a></li>
      <li><a href="projetos.html">Projetos</a></li>
      <li><a href="relatorios.html">Relatórios</a></li>
    </ul>
  </div>

  <!-- Barra de Navegação -->
  <header>
    <button class="open-btn" onclick="openSidebar()">☰</button>
    <h1>Bem-vindo ao Dashboard</h1>
  </header>

  <!-- Conteúdo da Página de Início -->
  <div id="content">
    <section class="intro">
      <h2>Introdução ao Dashboard</h2>
      <p>Este é o seu painel de controle, onde você pode visualizar e gerenciar todas as informações e ações. Use o menu lateral para navegar entre as diferentes seções do dashboard.</p>
    </section>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
