<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Publicações</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="server.js"></script>
</head>
<body id="dashboard">
  <header>
    <h1>Painel de Controle</h1>
  </header>
  <main>
    <section id="form-section">
      <h2>Nova Publicação</h2>
      <form id="publication-form" onsubmit="savePublication(event)">
        <input type="text" id="titulo" placeholder="Título da Publicação" required>
        <textarea id="conteudo" placeholder="Conteúdo" required></textarea>
        <input type="text" id="categoria" placeholder="Categoria" required>
        <input type="url" id="media-url" placeholder="URL de Imagem ou Vídeo">
        <button type="submit">Salvar</button>
      </form>
    </section>
    <section id="publications">
      <h2>Publicações</h2>
      <div class="cards-container"></div>
    </section>
  </main>
</body>
</html>
